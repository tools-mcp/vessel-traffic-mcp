name: Documentation issue
description: Report missing, confusing, or stale documentation.
title: "[Docs]: "
labels: ["docs", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Documentation problem
      description: Which page is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested change
    validations:
      required: true
